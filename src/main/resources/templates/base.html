<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - FoodExpress'">FoodExpress</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <header>
            <div style="flex: 3">
                <h1><a th:href="@{/home}">🍕 FoodExpress</a></h1>
            </div>
            <div class="search-bar" style="flex: 2">
                <form method="get">
                    <input type="text" name="search" placeholder="🔍 Search restaurants or food..." th:value="${searchTerm}">
                </form>
            </div>
            <div style="flex: 2; text-align: right;">
                <span th:if="${session.loggedInUser == null}">
                    <a th:href="@{/login}" class="btn-secondary" style="margin-right: 10px;">Login</a>
                    <a th:href="@{/signup}" class="btn-primary" style="width: auto; margin-right: 10px;">Sign Up</a>
                </span>
                <span th:if="${session.loggedInUser != null}">
                    <a th:if="${session.loggedInUser.role == 'ROLE_ADMIN'}" th:href="@{/admin/dashboard}" class="btn-primary" style="width: auto; margin-right: 10px; background: #6c5ce7;">Admin</a>
                    <a th:href="@{/profile}" class="btn-secondary" style="margin-right: 10px;">Profile</a>
                </span>
                <a th:href="@{/cart}" class="cart-btn">🛒 Cart (<span th:text="${cartCount}">0</span>)</a>
            </div>
        </header>

        <hr>
        
        <div th:if="${successMessage}" class="success-msg" th:text="${successMessage}"></div>
        <div th:if="${error}" class="error-msg" th:text="${error}"></div>
        
        <div th:replace="${content}"></div>
    </div>
</body>
</html>
