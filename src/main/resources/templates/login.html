<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: layout('Login', ~{::content})}">
<body>
    <div th:fragment="content">
        <div class="auth-container">
            <h2>Welcome Back</h2>
            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" id="passwordField" required>
                    <label style="font-size: 0.8rem; cursor: pointer; display: flex; align-items: center; gap: 5px; margin-top: 5px;">
                        <input type="checkbox" onclick="togglePassword('passwordField')"> Show Password
                    </label>
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 10px;">Login</button>
                <a th:href="@{/}" class="btn-secondary" style="width: 100%; text-align: center; display: block; margin-top: 10px; box-sizing: border-box;">Cancel</a>
                <p style="text-align: center; margin-top: 20px;">
                    Don't have an account? <a th:href="@{/signup}" style="color: var(--primary-color);">Sign up</a>
                </p>
            </form>
        </div>

        <script>
            function togglePassword(id) {
                const field = document.getElementById(id);
                field.type = field.type === "password" ? "text" : "password";
            }
        </script>
    </div>
</body>
</html>
