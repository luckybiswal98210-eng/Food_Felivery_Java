<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: layout('Cart', ~{::content})}">
<head>
</head>
<body>
    <div th:fragment="content">
        <h2>🛒 Your Cart</h2>

        <div th:if="${orderSuccess}" class="success-msg">
            🎉 Order placed successfully! Order ID: <span th:text="${orderSuccess}"></span><br>
            Your order will be delivered soon!
        </div>

        <div th:if="${#lists.isEmpty(cartItems) and orderSuccess == null}">
            <p style="padding: 15px; background: rgba(0, 150, 255, 0.1); color: #66b3ff; border-radius: 5px;">Your cart is empty</p>
            <a th:href="@{/}" class="btn-secondary" style="margin-top: 10px;">← Back to Restaurants</a>
        </div>

        <div th:if="${not #lists.isEmpty(cartItems)}">
            <div th:each="cartItem : ${cartItems}" class="cart-item">
                <div class="cart-item-info">
                    <strong th:text="${cartItem.item.name}">Name</strong>
                    <p th:text="${cartItem.item.description}">Description</p>
                </div>
                <div class="cart-item-price price-tag" th:text="'₹' + ${#numbers.formatDecimal(cartItem.item.price, 1, 'COMMA', 2, 'POINT')}">₹100.00</div>
                <div class="cart-item-qty">Qty: <span th:text="${cartItem.quantity}">1</span></div>
                <div class="cart-item-actions">
                    <form th:action="@{/cart/update}" method="post" style="display:inline;">
                        <input type="hidden" name="itemId" th:value="${cartItem.item.id}">
                        <input type="hidden" name="delta" value="-1">
                        <button type="submit" class="btn-icon">➖</button>
                    </form>
                    <form th:action="@{/cart/update}" method="post" style="display:inline;">
                        <input type="hidden" name="itemId" th:value="${cartItem.item.id}">
                        <input type="hidden" name="delta" value="1">
                        <button type="submit" class="btn-icon">➕</button>
                    </form>
                </div>
            </div>
            
            <h3 style="margin-top: 20px;">Total: <span class="price-tag" th:text="'₹' + ${#numbers.formatDecimal(total, 1, 'COMMA', 2, 'POINT')}">₹0.00</span></h3>

            <hr>

            <h3>📝 Delivery Information</h3>
            <form th:action="@{/checkout}" method="post" th:object="${checkoutForm}">
                <div class="form-group">
                    <input type="text" th:field="*{name}" placeholder="Full Name*" required>
                </div>
                <div class="form-group">
                    <input type="email" th:field="*{email}" placeholder="Email*" required>
                </div>
                <div class="form-group">
                    <input type="tel" th:field="*{phone}" placeholder="Phone*" required>
                </div>
                <div class="form-group">
                    <textarea th:field="*{address}" placeholder="Delivery Address*" rows="3" required></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Place Order 🚀</button>
                    <a th:href="@{/}" class="btn-secondary" style="text-align: center;">← Back to Menu</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
