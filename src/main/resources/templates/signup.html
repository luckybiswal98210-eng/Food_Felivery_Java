<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: layout('Sign Up', ~{::content})}">
<body>
    <div th:fragment="content">
        <div class="auth-container">
            <h2>Create Account</h2>
            <form th:action="@{/signup}" method="post" th:object="${user}">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" th:field="*{name}" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" th:field="*{email}" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" th:field="*{password}" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" th:field="*{phone}" required>
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 10px;">Sign Up</button>
                <a th:href="@{/}" class="btn-secondary" style="width: 100%; text-align: center; display: block; margin-top: 10px; box-sizing: border-box;">Cancel</a>
                <p style="text-align: center; margin-top: 20px;">
                    Already have an account? <a th:href="@{/login}" style="color: var(--primary-color);">Login</a>
                </p>
            </form>
        </div>
    </div>
</body>
</html>
