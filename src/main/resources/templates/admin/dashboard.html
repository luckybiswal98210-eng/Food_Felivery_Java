<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: layout('Admin Dashboard', ~{::content})}">
<body>
    <div th:fragment="content">
        <div class="admin-header" style="margin-bottom: 40px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px;">
            <h1>🛠️ Admin Dashboard</h1>
            <p style="color: #aaa;">Manage your users and monitor orders from one place.</p>
        </div>

        <div class="grid-2">
            <div class="card" style="padding: 20px;">
                <h3>👥 Registered Users (<span th:text="${users.size()}">0</span>)</h3>
                <div style="overflow-x: auto;">
                    <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
                        <thead>
                            <tr style="border-bottom: 1px solid rgba(255,255,255,0.1); text-align: left;">
                                <th style="flex: 0.5; padding: 10px;">ID</th>
                                <th style="flex: 2; padding: 10px;">Name</th>
                                <th style="flex: 3; padding: 10px;">Email</th>
                                <th style="flex: 2; padding: 10px;">Password</th>
                                <th style="flex: 1.5; padding: 10px;">Role</th>
                                <th style="flex: 1; padding: 10px;">Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="u : ${users}" style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                                <td colspan="4" style="padding: 0;">
                                    <form th:action="@{/admin/user/update}" method="post" style="display: flex; width: 100%; align-items: center; padding: 10px;">
                                        <input type="hidden" name="id" th:value="${u.id}">
                                        <div style="flex: 0.5; padding: 0 5px;" th:text="${u.id}"></div>
                                        <div style="flex: 2; padding: 0 5px;">
                                            <input type="text" name="name" th:value="${u.name}" style="width: 100%; padding: 5px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); color: white;">
                                        </div>
                                        <div style="flex: 3; padding: 0 5px;">
                                            <input type="email" name="email" th:value="${u.email}" style="width: 100%; padding: 5px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); color: white;">
                                        </div>
                                        <div style="flex: 2; padding: 0 5px;">
                                            <input type="text" name="password" th:value="${u.password}" placeholder="Password" style="width: 100%; padding: 5px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); color: white;">
                                        </div>
                                        <div style="flex: 1.5; padding: 0 5px;">
                                            <select name="role" style="width: 100%; padding: 5px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); color: white;">
                                                <option value="ROLE_USER" th:selected="${u.role == 'ROLE_USER'}">USER</option>
                                                <option value="ROLE_ADMIN" th:selected="${u.role == 'ROLE_ADMIN'}">ADMIN</option>
                                            </select>
                                        </div>
                                        <div style="flex: 1; padding: 0 5px;">
                                            <button type="submit" class="btn-primary" style="padding: 5px 10px; font-size: 0.8rem;">Save</button>
                                        </div>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="card" style="padding: 20px;">
                <h3>📦 Recent Orders (<span th:text="${orders.size()}">0</span>)</h3>
                <div style="overflow-x: auto;">
                    <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
                        <thead>
                            <tr style="border-bottom: 1px solid rgba(255,255,255,0.1); text-align: left;">
                                <th style="padding: 10px;">ID</th>
                                <th style="padding: 10px;">Customer</th>
                                <th style="padding: 10px;">Amount</th>
                                <th style="padding: 10px;">Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="o : ${orders}" style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                                <td style="padding: 10px;" th:text="${o.orderUuid.substring(0,8)}">...</td>
                                <td style="padding: 10px;" th:text="${o.customerName}">...</td>
                                <td style="padding: 10px;" th:text="'₹' + ${o.totalAmount}">₹0</td>
                                <td style="padding: 10px;">
                                    <span th:text="${o.status}" style="color: #00c864;">Pending</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
