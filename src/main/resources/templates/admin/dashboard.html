<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: layout('Admin Dashboard', ~{::content})}">
<body>
    <div th:fragment="content">
        <div class="admin-header" style="margin-bottom: 40px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px;">
            <h1>🛠️ Admin Dashboard</h1>
            <p style="color: #aaa;">Manage your users and monitor orders from one place.</p>
        </div>

        <div class="grid-2">
            <div class="card" style="padding: 20px;">
                <h3>👥 Registered Users (<span th:text="${users.size()}">0</span>)</h3>
                <div style="overflow-x: auto;">
                    <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
                        <thead>
                            <tr style="border-bottom: 1px solid rgba(255,255,255,0.1); text-align: left;">
                                <th style="padding: 10px;">ID</th>
                                <th style="padding: 10px;">Name</th>
                                <th style="padding: 10px;">Email</th>
                                <th style="padding: 10px;">Role</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="u : ${users}" style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                                <td style="padding: 10px;" th:text="${u.id}">1</td>
                                <td style="padding: 10px;" th:text="${u.name}">John</td>
                                <td style="padding: 10px;" th:text="${u.email}">john@example.com</td>
                                <td style="padding: 10px;">
                                    <span th:text="${u.role}" th:class="${u.role == 'ROLE_ADMIN' ? 'tag-admin' : 'tag-user'}" 
                                          style="padding: 3px 8px; border-radius: 4px; font-size: 0.8rem; background: rgba(255,255,255,0.1);"></span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="card" style="padding: 20px;">
                <h3>📦 Recent Orders (<span th:text="${orders.size()}">0</span>)</h3>
                <div style="overflow-x: auto;">
                    <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
                        <thead>
                            <tr style="border-bottom: 1px solid rgba(255,255,255,0.1); text-align: left;">
                                <th style="padding: 10px;">ID</th>
                                <th style="padding: 10px;">Customer</th>
                                <th style="padding: 10px;">Amount</th>
                                <th style="padding: 10px;">Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="o : ${orders}" style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                                <td style="padding: 10px;" th:text="${o.orderUuid.substring(0,8)}">...</td>
                                <td style="padding: 10px;" th:text="${o.customerName}">...</td>
                                <td style="padding: 10px;" th:text="'₹' + ${o.totalAmount}">₹0</td>
                                <td style="padding: 10px;">
                                    <span th:text="${o.status}" style="color: #00c864;">Pending</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
